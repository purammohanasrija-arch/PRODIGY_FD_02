<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EMS — Employees</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div id="app" style="display:flex;min-height:100vh;position:relative;z-index:1;">

  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><circle cx="12" cy="8" r="4"/><path d="M6 20c0-3.314 2.686-6 6-6s6 2.686 6 6"/></svg>
        </div>
        <span class="sidebar-logo-text">EMS <span>Pro</span></span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-label">Overview</div>
        <div class="nav-item" data-page="dashboard" onclick="window.location.href='dashboard.html'">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Dashboard
        </div>
      </div>
      <div class="nav-section">
        <div class="nav-section-label">People</div>
        <div class="nav-item" data-page="employees" onclick="window.location.href='employees.html'">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
          Employees
          <span class="nav-badge" id="navBadge">0</span>
        </div>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="admin-card">
        <div class="admin-avatar" id="adminAvatar">A</div>
        <div class="admin-info">
          <div class="admin-name" id="adminName">Admin</div>
          <div class="admin-role">Administrator</div>
        </div>
        <button class="logout-btn" onclick="handleLogout()" title="Logout">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main">
    <div class="topbar">
      <button class="hamburger" onclick="toggleSidebar()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="topbar-title">Employees</div>
      <div class="topbar-actions">
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" placeholder="Search employees…" oninput="handleSearch(this.value)"/>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        </button>
        <button class="btn btn-primary btn-sm" onclick="openAddModal()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Employee
        </button>
      </div>
    </div>

    <div class="content">
      <div class="section-header">
        <div class="section-title">All Employees</div>
        <button class="btn btn-ghost btn-sm" id="exportCsvBtn" onclick="handleExportCSV()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export CSV
        </button>
      </div>
      <div class="filter-row">
        <select class="filter-select" id="deptFilter" onchange="applyFilters()">
          <option value="">All Departments</option>
          <option>Engineering</option><option>Marketing</option><option>Sales</option>
          <option>HR</option><option>Finance</option><option>Operations</option><option>Design</option>
        </select>
        <select class="filter-select" id="sortFilter" onchange="applyFilters()">
          <option value="newest">Newest First</option>
          <option value="oldest">Oldest First</option>
          <option value="name">Name A–Z</option>
          <option value="salary-high">Salary High–Low</option>
          <option value="salary-low">Salary Low–High</option>
        </select>
        <div class="salary-range-filter">
          <span class="salary-range-label">Salary</span>
          <span class="salary-range-value" id="salaryRangeValue">All</span>
          <div class="salary-slider-track" id="salarySliderTrack">
            <div class="salary-slider-fill" id="salarySliderFill"></div>
            <input type="range" id="salaryMin" class="salary-slider" min="0" max="100000" value="0" oninput="handleSalarySlider()"/>
            <input type="range" id="salaryMax" class="salary-slider" min="0" max="100000" value="100000" oninput="handleSalarySlider()"/>
          </div>
          <button class="salary-range-reset" id="salaryRangeReset" onclick="resetSalaryRange()" title="Reset" style="display:none">×</button>
        </div>
        <span id="resultCount" style="color:var(--muted);font-size:.83rem;margin-left:auto;"></span>
      </div>

      <div class="bulk-bar" id="bulkBar">
        <span id="bulkCount">0 selected</span>
        <div class="bulk-bar-actions">
          <button class="btn btn-ghost btn-sm" onclick="handleExportCSV(true)">Export Selected</button>
          <button class="btn btn-danger btn-sm" onclick="openBulkDeleteModal()">Delete Selected</button>
          <button class="btn btn-ghost btn-sm" onclick="clearSelection()">Cancel</button>
        </div>
      </div>

      <div class="table-card">
        <div class="table-wrapper">
          <table>
            <thead><tr>
              <th class="th-check"><input type="checkbox" id="selectAllCheck" onchange="toggleSelectAll(this)"/></th>
              <th onclick="sortBy('name')">Employee</th>
              <th onclick="sortBy('department')">Department</th>
              <th onclick="sortBy('designation')">Designation</th>
              <th>Phone</th>
              <th onclick="sortBy('salary')">Salary</th>
              <th>Actions</th>
            </tr></thead>
            <tbody id="empTable"></tbody>
          </table>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>
    </div>
  </main>
</div>

<!-- ════ SHARED MODALS ════ -->

<!-- Add/Edit Employee -->
<div class="modal-overlay" id="empModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Add Employee</div>
      <button class="modal-close" onclick="closeModal('empModal')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="photo-upload-row">
        <div class="photo-preview" id="fPhotoPreview">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
        </div>
        <div class="photo-upload-actions">
          <label class="btn btn-ghost btn-sm" for="fPhotoInput">Upload Photo</label>
          <input type="file" id="fPhotoInput" accept="image/*" style="display:none" onchange="handlePhotoSelect(this)"/>
          <button class="btn btn-ghost btn-sm" type="button" id="fPhotoRemoveBtn" onclick="clearPhotoField()" style="display:none">Remove</button>
        </div>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label>Employee ID *</label>
          <input type="text" id="fId" placeholder="e.g. EMP-001"/>
          <div class="field-error" id="fIdErr"></div>
        </div>
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" id="fName" placeholder="John Doe"/>
          <div class="field-error" id="fNameErr"></div>
        </div>
        <div class="form-group">
          <label>Email Address *</label>
          <input type="email" id="fEmail" placeholder="john@company.com"/>
          <div class="field-error" id="fEmailErr"></div>
        </div>
        <div class="form-group">
          <label>Phone Number *</label>
          <input type="tel" id="fPhone" placeholder="+91 99999 99999"/>
          <div class="field-error" id="fPhoneErr"></div>
        </div>
        <div class="form-group">
          <label>Department *</label>
          <select id="fDept">
            <option value="">Select Department</option>
            <option>Engineering</option><option>Marketing</option><option>Sales</option>
            <option>HR</option><option>Finance</option><option>Operations</option><option>Design</option>
          </select>
          <div class="field-error" id="fDeptErr"></div>
        </div>
        <div class="form-group">
          <label>Designation *</label>
          <input type="text" id="fDesig" placeholder="e.g. Software Engineer"/>
          <div class="field-error" id="fDesigErr"></div>
        </div>
        <div class="form-group full">
          <label>Salary (₹) *</label>
          <input type="number" id="fSalary" placeholder="e.g. 75000" min="0"/>
          <div class="field-error" id="fSalaryErr"></div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('empModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveEmployee()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/></svg>
        Save Employee
      </button>
    </div>
  </div>
</div>

<!-- View Profile -->
<div class="modal-overlay" id="profileModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Employee Profile</div>
      <button class="modal-close" onclick="closeModal('profileModal')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" id="profileBody"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('profileModal')">Close</button>
      <button class="btn btn-primary" id="editFromProfile">Edit Profile</button>
    </div>
  </div>
</div>

<!-- Delete Confirm -->
<div class="modal-overlay delete-modal" id="deleteModal">
  <div class="modal">
    <div class="modal-body">
      <div class="delete-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
      </div>
      <div class="delete-title">Delete Employee?</div>
      <p class="delete-desc" id="deleteDesc">This action cannot be undone.</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('deleteModal')">Cancel</button>
      <button class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="app.js"></script>
<script>
API.init();
if (!API.token) window.location.href = 'index.html';
initSidebar('employees');

let currentPage = 1;
let currentSearch = '';
let currentDept = '';
let currentSort = 'newest';
let sortField = null, sortDir = 1;
let salaryMinVal = null, salaryMaxVal = null;
let selectedIds = new Set();

// pick up ?q= from dashboard search
const urlQ = new URLSearchParams(location.search).get('q');
if (urlQ) {
  currentSearch = urlQ;
  document.getElementById('searchInput').value = urlQ;
}

// initialize salary slider bounds from actual data
(function initSalarySlider() {
  const stats = API.getStats();
  const lo = Math.floor(stats.minSalary / 1000) * 1000;
  const hi = Math.ceil(stats.maxSalary / 1000) * 1000 || 100000;
  const minEl = document.getElementById('salaryMin');
  const maxEl = document.getElementById('salaryMax');
  minEl.min = maxEl.min = lo;
  minEl.max = maxEl.max = hi;
  minEl.value = lo;
  maxEl.value = hi;
  updateSalarySliderUI();
})();

function loadEmployees() {
  const result = API.getEmployeeList({
    search: currentSearch, department: currentDept,
    page: currentPage, limit: 10, sort: currentSort,
    minSalary: salaryMinVal, maxSalary: salaryMaxVal
  });
  renderTableRows(result.employees);
  document.getElementById('resultCount').textContent = `${result.total} employee${result.total!==1?'s':''}`;
  document.getElementById('navBadge').textContent = API.getStats().total;
  renderPagination(result.total, result.pages);
  updateBulkBar();
}

function renderTableRows(employees) {
  const tbody = document.getElementById('empTable');
  if (!employees.length) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <p>No employees found</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = employees.map((e,i) => {
    const checked = selectedIds.has(e._id) ? 'checked' : '';
    return `<tr style="animation-delay:${i*0.04}s">
      <td class="th-check"><input type="checkbox" class="row-check" data-id="${e._id}" ${checked} onchange="toggleRowSelect('${e._id}',this.checked)"/></td>
      <td><div class="emp-cell">
        ${avatarMarkup(e)}
        <div><div class="emp-name">${e.name}</div><div class="emp-id">${e.employeeId}</div></div>
      </div></td>
      <td><span class="badge" style="background:rgba(47,111,237,.15);color:var(--accent)">${e.department}</span></td>
      <td>${e.designation}</td>
      <td>${e.phone}</td>
      <td>₹${formatNum(e.salary)}</td>
      <td><div class="actions-cell">
        <button class="btn btn-ghost btn-icon btn-sm" title="View" onclick="viewProfile('${e._id}')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
        <button class="btn btn-success btn-icon btn-sm" title="Edit" onclick="openEditModal('${e._id}')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="btn btn-danger btn-icon btn-sm" title="Delete" onclick="openDeleteModal('${e._id}','${e.name}')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
        </button>
      </div></td>
    </tr>`;
  }).join('');
  syncSelectAllCheckbox();
}

function renderPagination(total, pages) {
  const p = document.getElementById('pagination');
  if (pages <= 1) { p.innerHTML=''; return; }
  let btns = '';
  for (let i=1;i<=pages;i++) btns += `<button class="page-btn${i===currentPage?' active':''}" onclick="goPage(${i})">${i}</button>`;
  p.innerHTML = `
    <span>Showing ${Math.min((currentPage-1)*10+1,total)}–${Math.min(currentPage*10,total)} of ${total}</span>
    <div class="page-btns">
      <button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage<=1?'disabled':''}>‹</button>
      ${btns}
      <button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage>=pages?'disabled':''}>›</button>
    </div>`;
}

function goPage(n) { currentPage=n; loadEmployees(); }

let searchTimer;
function handleSearch(v) {
  currentSearch = v;
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { currentPage=1; loadEmployees(); }, 300);
}

function applyFilters() {
  currentDept = document.getElementById('deptFilter').value;
  currentSort = document.getElementById('sortFilter').value;
  currentPage = 1;
  loadEmployees();
}

function sortBy(field) {
  if (sortField === field) sortDir *= -1; else { sortField=field; sortDir=1; }
  const emps = API.getEmployees();
  emps.sort((a,b) => {
    let av=a[field], bv=b[field];
    if (typeof av==='string') return sortDir*av.localeCompare(bv);
    return sortDir*(av-bv);
  });
  const start = (currentPage-1)*10;
  renderTableRows(emps.slice(start, start+10));
}

// ════════ SALARY RANGE SLIDER ════════
function updateSalarySliderUI() {
  const minEl = document.getElementById('salaryMin');
  const maxEl = document.getElementById('salaryMax');
  const lo = Number(minEl.min), hi = Number(minEl.max);
  let v1 = Number(minEl.value), v2 = Number(maxEl.value);
  if (v1 > v2) { [v1, v2] = [v2, v1]; } // keep handles from crossing visually
  const fill = document.getElementById('salarySliderFill');
  const pctLo = hi>lo ? ((v1-lo)/(hi-lo))*100 : 0;
  const pctHi = hi>lo ? ((v2-lo)/(hi-lo))*100 : 100;
  fill.style.left = pctLo+'%';
  fill.style.right = (100-pctHi)+'%';
  const isFullRange = v1<=lo && v2>=hi;
  document.getElementById('salaryRangeValue').textContent = isFullRange
    ? 'All' : `₹${formatNum(v1)} – ₹${formatNum(v2)}`;
  document.getElementById('salaryRangeReset').style.display = isFullRange ? 'none' : '';
}
function handleSalarySlider() {
  const minEl = document.getElementById('salaryMin');
  const maxEl = document.getElementById('salaryMax');
  let v1 = Number(minEl.value), v2 = Number(maxEl.value);
  if (v1 > v2) {
    // prevent handles from passing through each other
    if (document.activeElement === minEl) minEl.value = v2; else maxEl.value = v1;
  }
  updateSalarySliderUI();
  const lo = Number(minEl.min), hi = Number(minEl.max);
  const v1f = Number(minEl.value), v2f = Number(maxEl.value);
  salaryMinVal = v1f <= lo ? null : v1f;
  salaryMaxVal = v2f >= hi ? null : v2f;
  currentPage = 1;
  loadEmployees();
}
function resetSalaryRange() {
  const minEl = document.getElementById('salaryMin');
  const maxEl = document.getElementById('salaryMax');
  minEl.value = minEl.min;
  maxEl.value = maxEl.max;
  salaryMinVal = null; salaryMaxVal = null;
  updateSalarySliderUI();
  currentPage = 1;
  loadEmployees();
}

// ════════ BULK SELECT ════════
function toggleRowSelect(id, checked) {
  if (checked) selectedIds.add(id); else selectedIds.delete(id);
  updateBulkBar();
  syncSelectAllCheckbox();
}
function toggleSelectAll(checkbox) {
  document.querySelectorAll('#empTable .row-check').forEach(cb => {
    cb.checked = checkbox.checked;
    if (checkbox.checked) selectedIds.add(cb.dataset.id); else selectedIds.delete(cb.dataset.id);
  });
  updateBulkBar();
}
function syncSelectAllCheckbox() {
  const boxes = Array.from(document.querySelectorAll('#empTable .row-check'));
  const all = document.getElementById('selectAllCheck');
  if (!boxes.length) { all.checked = false; all.indeterminate = false; return; }
  const checkedCount = boxes.filter(b => b.checked).length;
  all.checked = checkedCount === boxes.length;
  all.indeterminate = checkedCount > 0 && checkedCount < boxes.length;
}
function clearSelection() {
  selectedIds.clear();
  document.querySelectorAll('#empTable .row-check').forEach(cb => cb.checked = false);
  updateBulkBar();
  syncSelectAllCheckbox();
}
function updateBulkBar() {
  const bar = document.getElementById('bulkBar');
  const count = selectedIds.size;
  document.getElementById('bulkCount').textContent = `${count} selected`;
  bar.classList.toggle('show', count > 0);
}
function openBulkDeleteModal() {
  const count = selectedIds.size;
  if (!count) return;
  document.getElementById('deleteDesc').textContent = `Are you sure you want to remove ${count} employee${count!==1?'s':''}? This action cannot be undone.`;
  document.getElementById('confirmDeleteBtn').onclick = () => {
    API.bulkDeleteEmployees(Array.from(selectedIds));
    closeModal('deleteModal');
    showToast(`${count} employee${count!==1?'s':''} deleted`, 'error');
    clearSelection();
    loadEmployees();
  };
  openModal('deleteModal');
}

// ════════ CSV EXPORT ════════
function handleExportCSV(selectedOnly=false) {
  let employees;
  if (selectedOnly) {
    employees = API.getEmployees().filter(e => selectedIds.has(e._id));
  } else {
    employees = API.getEmployeeList({
      search: currentSearch, department: currentDept, sort: currentSort,
      minSalary: salaryMinVal, maxSalary: salaryMaxVal, limit: 100000
    }).employees;
  }
  exportEmployeesCSV(employees, selectedOnly ? 'selected-employees.csv' : 'employees.csv');
}

// ════════ KEYBOARD SHORTCUTS ════════
document.addEventListener('keydown', (e) => {
  const tag = (e.target.tagName || '').toLowerCase();
  const typing = tag==='input' || tag==='select' || tag==='textarea';
  if (e.key === '/' && !typing) {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  } else if ((e.key === 'n' || e.key === 'N') && !typing) {
    e.preventDefault();
    openAddModal();
  }
});

loadEmployees();
</script>
</body>
